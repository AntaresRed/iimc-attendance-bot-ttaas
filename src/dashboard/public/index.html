<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AttendanceBot Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg0:#06091a;--bg1:#0a0f24;--bg2:#111827;--bg3:#1c2740;--bg4:#243350;
--accent:#6366f1;--alight:#818cf8;--adark:#4f46e5;--green:#10b981;--red:#f43f5e;
--yellow:#f59e0b;--blue:#38bdf8;--purple:#a78bfa;--border:rgba(99,102,241,.14);
--text1:#f1f5f9;--text2:#94a3b8;--text3:#475569;--r:10px;--sh:0 4px 30px rgba(0,0,0,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--text1);min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
/* ── Login ───────────────────────────────────────────────────────────────── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse 80% 80% at 50% -20%,rgba(99,102,241,.25),transparent)}
.login-card{background:rgba(17,24,39,.85);backdrop-filter:blur(20px);border:1px solid var(--border);
  border-radius:20px;padding:48px 40px;width:360px;text-align:center;box-shadow:var(--sh)}
.login-logo{font-size:52px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(99,102,241,.7))}
.login-card h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.login-card p{color:var(--text2);font-size:.875rem;margin-bottom:32px}
.login-card input[type=password]{width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 16px;color:var(--text1);font-size:.9rem;outline:none;
  transition:.2s;margin-bottom:12px}
.login-card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.2)}
.login-card button{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s}
.login-card button:hover{background:var(--alight);transform:translateY(-1px)}
#login-error{color:var(--red);font-size:.82rem;margin-top:10px}
/* ── Layout ──────────────────────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#0c1122,#07091c);
  border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0 0 20px}
.sidebar-logo{padding:22px 20px 18px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border)}
.logo-icon{font-size:26px;filter:drop-shadow(0 0 8px rgba(99,102,241,.8))}
.logo-text{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#fff,var(--alight));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r);
  border:none;background:none;color:var(--text2);cursor:pointer;font-size:.875rem;font-weight:500;
  width:100%;text-align:left;transition:.18s}
.nav-item:hover{background:var(--bg3);color:var(--text1)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--alight);border:1px solid rgba(99,102,241,.25)}
.nav-icon{font-size:1.1rem;width:24px;text-align:center}
.sidebar-bottom{padding:10px 10px 0;border-top:1px solid var(--border);margin-top:auto}
.btn-logout{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);
  border:none;background:none;color:var(--text3);cursor:pointer;font-size:.85rem;width:100%;
  transition:.18s}
.btn-logout:hover{background:rgba(244,63,94,.1);color:var(--red)}
/* ── Main ────────────────────────────────────────────────────────────────── */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  height:60px;border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0}
.topbar h2{font-size:1.1rem;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:16px}
.bot-badge{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;
  font-size:.78rem;font-weight:600;border:1px solid}
.bot-badge.connected{color:var(--green);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}
.bot-badge.disconnected{color:var(--red);border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.08)}
.bot-badge.pending{color:var(--yellow);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;
  box-shadow:0 0 6px currentColor}
.status-dot.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{flex:1;overflow-y:auto;padding:28px;background:var(--bg0)}
/* ── Cards ───────────────────────────────────────────────────────────────── */
.page{animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;display:flex;align-items:center;gap:16px}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-icon.indigo{background:rgba(99,102,241,.15)}
.stat-icon.green{background:rgba(16,185,129,.15)}
.stat-icon.blue{background:rgba(56,189,248,.15)}
.stat-icon.yellow{background:rgba(245,158,11,.15)}
.stat-val{font-size:1.6rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.78rem;color:var(--text2);margin-top:4px}
/* ── Two-column grid ─────────────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card-title{font-size:.85rem;font-weight:600;color:var(--text2);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
/* ── Tables ──────────────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg2);font-size:.835rem}
thead th{background:var(--bg3);padding:11px 14px;text-align:left;font-size:.75rem;
  font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;
  position:sticky;top:0;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:10px 14px;color:var(--text1);vertical-align:middle;white-space:nowrap}
/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:capitalize}
.badge-student{background:rgba(56,189,248,.15);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.badge-cr{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.badge-superadmin{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}
.badge-present{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-absent{background:rgba(244,63,94,.15);color:var(--red);border:1px solid rgba(244,63,94,.25)}
.badge-cancelled{background:rgba(100,116,139,.15);color:var(--text2);border:1px solid rgba(100,116,139,.25)}
.badge-rescheduled{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.badge-extra{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.25)}
/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;
  border:none;transition:.18s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--alight)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text1)}
.btn-danger{background:rgba(244,63,94,.15);color:var(--red);border:1px solid rgba(244,63,94,.25)}
.btn-danger:hover{background:rgba(244,63,94,.25)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-icon{padding:5px 8px;background:none;border:1px solid var(--border);border-radius:6px;
  cursor:pointer;font-size:.85rem;transition:.15s;color:var(--text2)}
.btn-icon:hover{background:var(--bg3);color:var(--text1)}
.act-row{display:flex;gap:4px}
/* ── Filters ─────────────────────────────────────────────────────────────── */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;color:var(--text1);font-size:.82rem;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
.filter-bar select option{background:var(--bg2)}
.ml-auto{margin-left:auto}
/* ── Progress bar ────────────────────────────────────────────────────────── */
.pbar-wrap{display:flex;align-items:center;gap:8px;min-width:100px}
.pbar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:var(--accent);transition:.4s}
.pbar-lbl{font-size:.75rem;color:var(--text2);width:34px;text-align:right;flex-shrink:0}
/* ── Timetable grid ──────────────────────────────────────────────────────── */
.tt-grid{width:100%;border-collapse:collapse;table-layout:fixed}
.tt-grid th{background:var(--bg3);padding:8px;font-size:.75rem;font-weight:600;
  color:var(--text2);text-align:center;border:1px solid var(--border)}
.tt-grid td{border:1px solid var(--border);padding:4px;vertical-align:top;min-height:60px}
.tt-grid .time-col{background:var(--bg3);width:64px;padding:8px 10px;font-size:.75rem;
  color:var(--text2);font-weight:500;text-align:right}
.tt-cell{border-radius:6px;padding:6px 8px;margin:2px;cursor:pointer;transition:.15s;
  position:relative;display:flex;flex-direction:column;gap:2px;min-height:52px}
.tt-cell:hover .tt-actions{opacity:1}
.tt-subject{font-size:.72rem;font-weight:600;line-height:1.3}
.tt-time{font-size:.67rem;color:rgba(255,255,255,.6)}
.tt-actions{position:absolute;top:3px;right:3px;display:flex;gap:2px;opacity:0;transition:.15s}
.tt-actions button{padding:2px 5px;font-size:.65rem;border-radius:4px;border:none;cursor:pointer}
.tt-add-cell{display:flex;align-items:center;justify-content:center;height:100%;min-height:52px}
.tt-add-btn{background:none;border:1px dashed var(--border);border-radius:6px;color:var(--text3);
  cursor:pointer;font-size:1.1rem;width:100%;min-height:52px;transition:.15s;margin:2px}
.tt-add-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.05)}
/* ── Modal ───────────────────────────────────────────────────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.8);animation:fadein .15s ease}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:1rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.3rem;cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:.15s}
.modal-close:hover{background:var(--bg3);color:var(--text1)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-ftr{display:flex;justify-content:flex-end;gap:8px;padding:16px 22px;
  border-top:1px solid var(--border)}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.8rem;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;padding:9px 12px;
  color:var(--text1);font-size:.875rem;outline:none;transition:.2s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.form-row select option{background:var(--bg2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;width:42px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border-radius:12px;cursor:pointer;
  border:1px solid var(--border);transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;
  background:var(--text3);left:3px;top:3px;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#fff}
/* ── Toast ───────────────────────────────────────────────────────────────── */
#toasts{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:.85rem;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.5);animation:slideIn .2s ease;display:flex;align-items:center;gap:8px;
  max-width:320px}
.toast-ok{background:#0f2920;border:1px solid rgba(16,185,129,.35);color:#6ee7b7}
.toast-err{background:#2a0f12;border:1px solid rgba(244,63,94,.35);color:#fca5a5}
.toast-info{background:#0f1629;border:1px solid rgba(99,102,241,.35);color:#a5b4fc}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
/* ── Timetable selector ──────────────────────────────────────────────────── */
.tt-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.tt-toolbar select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;color:var(--text1);font-size:.875rem;outline:none;min-width:200px}
/* ── Bot status page ─────────────────────────────────────────────────────── */
.bot-status-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:20px}
.bs-orb{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:2rem;margin-bottom:16px}
.bs-orb.on{background:rgba(16,185,129,.2);box-shadow:0 0 40px rgba(16,185,129,.4)}
.bs-orb.off{background:rgba(244,63,94,.2);box-shadow:0 0 40px rgba(244,63,94,.3)}
.bs-orb.qr{background:rgba(245,158,11,.2);box-shadow:0 0 40px rgba(245,158,11,.3)}
.bs-label{font-size:1.4rem;font-weight:700;margin-bottom:6px}
.bs-sub{font-size:.875rem;color:var(--text2)}
/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px;color:var(--text3)}
.empty-state .icon{font-size:2.5rem;margin-bottom:10px}
.empty-state p{font-size:.875rem}
/* ── Misc ─────────────────────────────────────────────────────────────────── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-hdr h3{font-size:1rem;font-weight:600}
.chart-wrap{height:200px;position:relative}
.toggle-status{cursor:pointer;user-select:none}
.toggle-status:hover{opacity:.8}
</style>
</head>
<body>

<!-- ── Login ────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🤖</div>
    <h1>AttendanceBot</h1>
    <p>Admin Dashboard — Sign in to continue</p>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password">
    <button id="login-btn">Sign In →</button>
    <p id="login-error" style="color:var(--red);font-size:.82rem;margin-top:10px;display:none"></p>
  </div>
</div>

<!-- ── App ──────────────────────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🤖</span>
      <span class="logo-text">AttendanceBot</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-section="overview"><span class="nav-icon">◉</span>Overview</button>
      <button class="nav-item" data-section="users"><span class="nav-icon">👥</span>Users</button>
      <button class="nav-item" data-section="timetables"><span class="nav-icon">📅</span>Timetables</button>
      <button class="nav-item" data-section="attendance"><span class="nav-icon">✅</span>Attendance</button>
      <button class="nav-item" data-section="overrides"><span class="nav-icon">🔄</span>Overrides</button>
      <button class="nav-item" data-section="audit"><span class="nav-icon">📋</span>Audit Log</button>
      <button class="nav-item" data-section="bot"><span class="nav-icon">🤖</span>Bot Status</button>
      <button class="nav-item" data-section="guide"><span class="nav-icon">📖</span>Guide</button>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" id="logout-btn"><span>⏻</span> Logout</button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <h2 id="page-title">Overview</h2>
      <div class="topbar-right">
        <div id="bot-badge" class="bot-badge disconnected"><span class="status-dot"></span><span id="bot-badge-text">Checking…</span></div>
      </div>
    </header>
    <main class="content">
      <div id="page-overview" class="page"></div>
      <div id="page-users" class="page" style="display:none"></div>
      <div id="page-timetables" class="page" style="display:none"></div>
      <div id="page-attendance" class="page" style="display:none"></div>
      <div id="page-overrides" class="page" style="display:none"></div>
      <div id="page-audit" class="page" style="display:none"></div>
      <div id="page-bot" class="page" style="display:none"></div>
      <div id="page-guide" class="page" style="display:none"></div>
    </main>
  </div>
</div>

<!-- ── Modal ────────────────────────────────────────────────────────────── -->
<div id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-hdr"><h3 id="modal-title"></h3><button class="modal-close" id="modal-close-btn">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-ftr" id="modal-ftr">
      <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save changes</button>
    </div>
  </div>
</div>

<!-- ── Toasts ───────────────────────────────────────────────────────────── -->
<div id="toasts"></div>

<script>
'use strict';
// ────────── State ──────────────────────────────────────────────────────────
const S = { section:'overview', sections:[], courses:[], chart:null, ttUserId:null };
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_ORDERED = [1,2,3,4,5,6,0]; // Mon-Sun display order
const DAY_LABELS   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ────────── API ────────────────────────────────────────────────────────────
const api = {
  async req(method,url,body){
    const r = await fetch(url,{method,headers:{'Content-Type':'application/json'},
      body:body?JSON.stringify(body):undefined});
    if(r.status===401){showLogin();return null;}
    return r.ok ? r.json() : Promise.reject(await r.json());
  },
  get:(url)=>api.req('GET',url),
  post:(url,b)=>api.req('POST',url,b),
  put:(url,b)=>api.req('PUT',url,b),
  del:(url)=>api.req('DELETE',url),
};

// ────────── Toast ──────────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span>${type==='ok'?'✓':type==='err'?'✕':'ℹ'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

// ────────── Modal ──────────────────────────────────────────────────────────
const modal = {
  _save:null,
  open(title,bodyHTML,onSave,saveLabel='Save changes',hideFtr=false){
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-body').innerHTML=bodyHTML;
    document.getElementById('modal-ftr').style.display=hideFtr?'none':'flex';
    document.getElementById('modal-save-btn').textContent=saveLabel;
    document.getElementById('modal-overlay').style.display='flex';
    modal._save=onSave;
  },
  close(){document.getElementById('modal-overlay').style.display='none';modal._save=null;},
  confirm(msg,onOk){
    modal.open('Confirm Action',`<p style="color:var(--text2);line-height:1.6">${msg}</p>`,onOk,'Confirm');
  }

const PAGE_TITLES={overview:'Overview',users:'Users',timetables:'Timetables',
  attendance:'Attendance Logs',overrides:'Schedule Overrides',audit:'Audit Log',bot:'Bot Status',guide:'System Guide'};

function navigate(sec){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(`page-${sec}`).style.display='block';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-section="${sec}"]`).classList.add('active');
  document.getElementById('page-title').textContent=PAGE_TITLES[sec]||sec;
  S.section=sec;
  pages[sec]&&pages[sec]();
}

// ────────── Helpers ────────────────────────────────────────────────────────
function subjectColor(name){
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0x7fffffff;
  return `hsl(${h%360},65%,62%)`;
}
function pct(a,b){return b?Math.round((a/b)*100):0;}
function fmt(v){return v??'—';}
function roleBadge(r){return `<span class="badge badge-${r}">${r}</span>`;}
function statusBadge(s){return `<span class="badge badge-${s} toggle-status">${s}</span>`;}
function timeAgo(ts){
  if(!ts)return'—'; const d=(Date.now()-new Date(ts))/1000;
  if(d<60)return'just now'; if(d<3600)return`${Math.floor(d/60)}m ago`;
  if(d<86400)return`${Math.floor(d/3600)}h ago`; return`${Math.floor(d/86400)}d ago`;
}
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';}
function el(id){return document.getElementById(id);}
function val(id){return el(id).value.trim();}
function sval(id){return el(id).value;}

async function renderTTGrid(uid){
  const entries=await api.get(`/api/timetable/${uid}`);

  if(!entries||!entries.length){wrap.innerHTML='<div class="empty-state"><div class="icon">📅</div><p>No timetable entries. Click "+ Add Class" to start.</p></div>';return;}
  const times=[...new Set(entries.map(e=>e.start_time))].sort();
  let html=`<div class="table-wrap"><table class="tt-grid"><thead><tr><th>Time</th>`;
  DAY_LABELS.forEach(d=>html+=`<th>${d}</th>`);
  html+='</tr></thead><tbody>';
  for(const t of times){
    html+=`<tr><td class="time-col">${t}</td>`;
    for(const dow of DAYS_ORDERED){
      const e=entries.find(x=>x.day_of_week===dow&&x.start_time===t);
      if(e){
        const col=subjectColor(e.subject);
        html+=`<td><div class="tt-cell" style="background:${col}18;border-left:3px solid ${col}">
          <span class="tt-subject">${e.subject}</span>
          <span class="tt-time">${e.start_time}–${e.end_time}${e.room?' · '+e.room:''}</span>
          <div class="tt-actions">
            <button style="background:rgba(99,102,241,.3);color:#c7d2fe;border-radius:4px;border:none;padding:2px 6px;cursor:pointer" onclick="editTTEntry(${JSON.stringify(e).replace(/"/g,'&quot;')})">✏</button>
            <button style="background:rgba(244,63,94,.3);color:#fca5a5;border-radius:4px;border:none;padding:2px 6px;cursor:pointer" onclick="delTTEntry(${e.id})">✕</button>
          </div></div></td>`;
      }else{
        html+=`<td><button class="tt-add-btn" onclick="addTTEntry(${dow},'${t}')">+</button></td>`;
      }
    }
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  wrap.innerHTML=html;
}

let attOffset=0;
async function loadAttendance(reset=true){
  if(reset)attOffset=0;
  const c=el('page-attendance');
  if(reset)c.innerHTML=`
  <div class="filter-bar">
    <input id="af-user" placeholder="Student name" style="width:160px">
    <input id="af-date" type="date">
    <input id="af-subj" placeholder="Subject…" style="width:160px">

  </div>
  <div id="att-table-wrap"></div>
  <div style="display:flex;gap:8px;margin-top:12px" id="att-pager"></div>`;

  const userId=el('af-user')?.value.trim()||'';
  const date=el('af-date')?.value||'';
  const subject=el('af-subj')?.value.trim()||'';
  const status=el('af-status')?.value||'';
  const params=new URLSearchParams({limit:50,offset:attOffset});
  if(userId)params.set('userId',userId);
  if(date)params.set('date',date);
  if(subject)params.set('subject',subject);
  if(status)params.set('status',status);
  const rows=await api.get(`/api/attendance?${params}`);if(!rows)return;
  el('att-count').textContent=`${rows.length} record${rows.length!==1?'s':''} shown`;
  el('att-table-wrap').innerHTML=rows.length?`<div class="table-wrap"><table><thead><tr>
    <th>Student</th><th>Date</th><th>Subject</th><th>Time</th><th>Status</th><th>Marked At</th><th>Actions</th>
  </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td>${r.user_name}</td><td>${r.session_date}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${r.subject}</td>
      <td>${r.session_start}</td>
      <td onclick="toggleAtt(${r.id},'${r.status}')" style="cursor:pointer">${statusBadge(r.status)}</td>
      <td style="color:var(--text3);font-size:.78rem">${r.marked_at?.slice(0,16)||'—'}</td>
      <td><button class="btn-icon" onclick="delAtt(${r.id})">🗑️</button></td>
    </tr>`).join('')}
  </tbody></table></div>`:
  '<div class="empty-state"><div class="icon">📋</div><p>No records match your filters.</p></div>';
  el('att-pager').innerHTML=`
    ${attOffset>0?`<button class="btn btn-ghost btn-sm" onclick="attOffset-=50;loadAttendance(false)">← Prev</button>`:''}
    ${rows.length===50?`<button class="btn btn-ghost btn-sm" onclick="attOffset+=50;loadAttendance(false)">Next →</button>`:''}`;
}
async function toggleAtt(id,current){
  const ns=current==='present'?'absent':'present';
  await api.put(`/api/attendance/${id}`,{status:ns});
  toast(`Marked as ${ns}`); loadAttendance(false);
}

  modal.confirm('Delete this attendance record permanently?',async()=>{
    await api.del(`/api/attendance/${id}`);toast('Deleted');loadAttendance(false);

      <a href="/api/backup/download" class="btn btn-primary" download>⬇ Download Backup</a>
      <button class="btn btn-ghost" id="push-backup-btn">☁ Push to GitHub Now</button>
      <button class="btn btn-ghost" onclick="el('restore-file').click()">📂 Restore from File</button>
      <input type="file" id="restore-file" accept=".gz" style="display:none">
    </div>
    <div id="backup-result" style="margin-top:12px;font-size:.82rem;color:var(--text2)"></div>
  </div>`;

  el('restore-file').onchange = async(e) => {
    const file = e.target.files[0];
    if(!file) return;
    modal.confirm(
      `<strong>⚠️ DANGER:</strong> Restoring this backup will permanently overwrite your live database.<br><br>File: <code>${file.name}</code><br>Are you sure?`,
      async () => {
        el('backup-result').innerHTML = '⏳ Restoring database and restarting server... please wait.';
        try {
          const res = await fetch('/api/backup/restore', {
            method: 'POST',
            body: file,
            headers: { 'Content-Type': 'application/gzip' }
          });
          const json = await res.json();
          if (res.ok) {
            el('backup-result').innerHTML = '✅ Restored! Automatically refreshing in 3 seconds...';
            setTimeout(() => window.location.reload(), 3000);
          } else {
            el('backup-result').innerHTML = `❌ Failed: ${json.error}`;
          }
        } catch(err) {
          el('backup-result').innerHTML = `❌ Connection lost (server is likely restarting). Try refreshing.`;
        }
      }
    );
    e.target.value = ''; // clear input so the same file can be picked again
  };

  el('push-backup-btn').onclick=async()=>{
    el('push-backup-btn').disabled=true;
    el('push-backup-btn').textContent='Pushing…';

    el('backup-result').textContent='';
    const r=await api.post('/api/backup/push');
    el('push-backup-btn').disabled=false;
    el('push-backup-btn').textContent='☁ Push to GitHub Now';
    if(r&&r.ok){
      el('backup-result').innerHTML=`✅ Pushed <strong>${r.filename}</strong> (${r.sizeKb} KB)${r.url?` — <a href="${r.url}" target="_blank" style="color:var(--accent)">view on GitHub</a>`:''}`;
    } else {
      el('backup-result').innerHTML=`❌ ${r?.error||'Unknown error — check BACKUP_GITHUB_TOKEN and BACKUP_GITHUB_REPO in Railway variables.'}`;
    }
  };

  if(s.connected){
    const discBtn=document.createElement('button');
    discBtn.className='btn btn-danger';
    discBtn.style='margin-top:16px';
    discBtn.textContent='⏏ Disconnect Bot';
    discBtn.onclick=()=>modal.confirm(
      'This will log the bot out of WhatsApp and remove it from your Linked Devices list.<br><br>You will need to scan a new QR code to reconnect. Continue?',
      async()=>{
        const r=await api.post('/api/bot/disconnect');
        if(r){toast('Bot disconnected. Scan QR to reconnect.','info');setTimeout(()=>loadBot(),2500);}
      }
    );
    c.querySelector('.bot-status-hero').appendChild(discBtn);
  }

  // Auto-refresh if QR is pending so the QR stays fresh
  if(s.qrPending && !window._botRefreshTimer){
    window._botRefreshTimer=setTimeout(()=>{window._botRefreshTimer=null;if(S.section==='bot')loadBot();},30000);
  }
}

// ────────── Bot badge polling ──────────────────────────────────────────────

async function pollBotStatus(){
  try{
    const s=await api.get('/api/bot/status');if(!s)return;
    const badge=el('bot-badge'),txt=el('bot-badge-text');
    badge.className='bot-badge '+(s.connected?'connected':s.qrPending?'pending':'disconnected');
    txt.textContent=s.connected?`Connected${s.phoneNumber?' · '+s.phoneNumber.replace('@s.whatsapp.net',''):''}`:s.qrPending?'Scan QR':'Disconnected';
  }catch(e){}
}

// ────────── Page router ────────────────────────────────────────────────────
const pages={overview:loadOverview,users:loadUsers,timetables:loadTimetables,
  attendance:()=>loadAttendance(true),overrides:loadOverrides,audit:loadAudit,bot:loadBot,guide:loadGuide};

// ────────── Auth ───────────────────────────────────────────────────────────
function showLogin(){el('login-screen').style.display='flex';el('app').style.display='none';}
function showApp(){el('login-screen').style.display='none';el('app').style.display='flex';}

el('login-btn').onclick=async()=>{
  const pw=el('pw-input').value;
  const err=el('login-error');
  err.style.display='none';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    if(r.ok){showApp();navigate('overview');pollBotStatus();setInterval(pollBotStatus,15000);}
    else{err.textContent='Incorrect password.';err.style.display='block';}
  }catch(e){err.textContent='Connection error.';err.style.display='block';}
};
el('pw-input').onkeydown=e=>{if(e.key==='Enter')el('login-btn').click();};

el('logout-btn').onclick=async()=>{
  await fetch('/api/logout',{method:'POST'});showLogin();
};

// ────────── Init ───────────────────────────────────────────────────────────
(async()=>{
  const r=await api.get('/api/auth/check');
  if(r&&r.ok){showApp();navigate('overview');pollBotStatus();setInterval(pollBotStatus,15000);}
  else showLogin();
})();
</script>
